services:
  mysql:
    image: mysql:8.4
    container_name: campuscircle-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${CAMPUSCIRCLE_DB_PASSWORD:-campuscircle_dev_pwd}
      MYSQL_DATABASE: campuscircle
      TZ: Asia/Shanghai
    ports:
      - "${CAMPUSCIRCLE_MYSQL_PORT:-3307}:3306"
    volumes:
      - campuscircle-mysql-data:/var/lib/mysql
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: campuscircle-redis
    restart: unless-stopped
    ports:
      - "${CAMPUSCIRCLE_REDIS_PORT:-6379}:6379"
    volumes:
      - campuscircle-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    profiles:
      - app
    build:
      context: .
    container_name: campuscircle-app
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: redis
      CAMPUSCIRCLE_DB_URL: jdbc:mysql://mysql:3306/campuscircle?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      CAMPUSCIRCLE_DB_USERNAME: root
      CAMPUSCIRCLE_DB_PASSWORD: ${CAMPUSCIRCLE_DB_PASSWORD:-campuscircle_dev_pwd}
      CAMPUSCIRCLE_REDIS_HOST: redis
      CAMPUSCIRCLE_REDIS_PORT: 6379
      CAMPUSCIRCLE_REDIS_PASSWORD: ""
      CAMPUSCIRCLE_REDIS_DATABASE: 0
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  campuscircle-mysql-data:
  campuscircle-redis-data:
